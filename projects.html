<!-- PROJECT SECTION -->

    <i class="fas fa-laptop-code"></i> My <span>Projects</span>
  </h1>

  <!-- FILTER BUTTONS -->
  <div class="button-group" id="filter-group">
    <button class="btn is-checked" data-filter="*">All</button>
    <button class="btn" data-filter=".reactjs">React.js</button>
    <button class="btn" data-filter=".laravel">Laravel</button>

    <!-- Loading state -->

      <p>Loading projects…</p>
    </div>
  </div>

<!-- SCROLL TOP -->
<a href="#work" class="fas fa-angle-up" id="scroll-top"></a>

<!-- JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

<script src="./assets/js/projects-data.js"></script>

<!-- PROJECT SCRIPT -->
<script src="./assets/js/project-script.js"></script>

<!-- NAVBAR TOGGLE -->
<script>
  const menu = document.getElementById("menu");
  const navbar = document.querySelector(".navbar");
  menu.addEventListener("click", () => {
    menu.classList.toggle("fa-times");
    navbar.classList.toggle("nav-toggle");
  });

  // Scroll-top button
  window.addEventListener("scroll", () => {
    const scrollTop = document.getElementById("scroll-top");
    if (window.scrollY > 300) {
      scrollTop.classList.add("active");
    } else {
      scrollTop.classList.remove("active");
    }
  });
</script>

</body>
