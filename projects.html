  <style>
    /* ✅ FIXED GRID LAYOUT */
    .box-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
      padding: 20px;
      margin: 0 auto;
      max-width: 1200px;
    }

    /* ✅ CARD DESIGN */
    .box {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      transition: 0.3s ease;
    }

    .box:hover {
      transform: translateY(-5px);
    }

    /* ✅ IMAGE */
    .box img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    /* ✅ CONTENT */
    .content {
      padding: 15px;
      text-align: center;
    }

    .tag h3 {
      margin-bottom: 10px;
    }

    .desc p {
      font-size: 14px;
      margin-bottom: 10px;
    }

    .btns {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .btn {
      padding: 8px 14px;
      border-radius: 6px;
      background: #007bff;
      color: #fff;
      text-decoration: none;
      font-size: 14px;
    }

    .btn:hover {
      background: #0056b3;
    }

    /* TOP INFO BAR */
    #info-menu {
      background: #111;
      color: white;
      padding: 8px 20px;
      font-size: 14px;
    }

    #info-menu a {
      color: white;
      margin-right: 15px;
      text-decoration: none;
    }

    /* BACK BUTTON */
    .backbtn {
      text-align: center;
      margin: 30px 0;
    }
  </style>
</head>
